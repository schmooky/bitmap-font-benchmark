server {
    listen       80;
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;

    # Angel-Code descriptors are fetched as text by PixiJS.
    types {
        text/plain  fnt;
        image/webp  webp;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript image/svg+xml;
    gzip_min_length 1024;

    # Long-cache the fingerprinted build assets and font atlases.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location /fonts/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Single-page app: everything else falls back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
